<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --hs-dark: #012B3A;
    --hs-red: #FF4C46;
    --hs-mint: #DFFFDE;
    --bg: #f5f5f5;
    --card: #ffffff;
    --border: #e0e0e0;
    --text: #1a1a1a;
    --text-muted: #666;
    --text-faint: #999;
    --qualify-bg: rgba(223,255,222,0.35);
  }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: Arial, sans-serif; font-size: 13px; background: var(--bg); color: var(--text); }

  /* Tabs bar — fixed at top, no topbar */
  .tabs-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 0 20px; display: flex; align-items: center;
    height: 40px;
  }
  .tab-btn {
    padding: 0 16px; height: 40px; font-size: 12px; font-weight: 700;
    color: var(--text-muted); border-bottom: 3px solid transparent;
    cursor: pointer; background: none; border-top: none; border-left: none;
    border-right: none; font-family: Arial, sans-serif;
  }
  .tab-btn.active { color: var(--hs-red); border-bottom-color: var(--hs-red); }
  .live-badge {
    background: var(--hs-red); color: #fff; font-size: 9px; font-weight: 700;
    border-radius: 3px; padding: 1px 5px; margin-left: 4px;
    vertical-align: middle; display: none;
  }
  /* Progress bar showing scroll/wait progress */
  .progress-bar {
    position: fixed; top: 40px; left: 0; right: 0; height: 3px;
    background: var(--border); z-index: 99;
  }
  .progress-fill {
    height: 100%; background: var(--hs-red); width: 0%;
    transition: width 0.1s linear;
  }

  /* Scrollable viewport below tabs */
  .viewport {
    position: fixed; top: 43px; left: 0; right: 0; bottom: 0;
    overflow: hidden;
  }
  /* Inner scroller — we scroll this programmatically */
  .scroller {
    width: 100%; height: 100%; overflow-y: scroll;
    scroll-behavior: auto;
  }
  /* Each tab panel */
  .tab-panel { display: none; padding: 16px 20px 40px; min-height: 100%; }
  .tab-panel.active { display: block; }

  /* Groups */
  .grp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .grp-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .grp-hdr { background: var(--hs-dark); color: var(--hs-mint); font-size: 11px; font-weight: 700; padding: 7px 12px; letter-spacing: 0.06em; text-transform: uppercase; }
  .grp-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .grp-table th { color: var(--text-faint); font-weight: 400; text-align: center; padding: 5px 4px; border-bottom: 1px solid var(--border); font-size: 10px; }
  .grp-table th:first-child { text-align: left; padding-left: 10px; }
  .grp-table td { padding: 6px 4px; text-align: center; border-bottom: 1px solid #f0f0f0; color: var(--text); }
  .grp-table td.tn { text-align: left; padding-left: 10px; display: flex; align-items: center; gap: 5px; max-width: 140px; overflow: hidden; }
  .grp-table tr:last-child td { border-bottom: none; }
  .grp-table tr.qualify td { background: var(--qualify-bg); }
  .pos-b { width: 15px; height: 15px; border-radius: 3px; font-size: 9px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .pos-q { background: var(--hs-mint); color: var(--hs-dark); }
  .pos-n { background: #f0f0f0; color: var(--text-muted); }
  .crest { width: 14px; height: 14px; object-fit: contain; flex-shrink: 0; }
  .pts-bold { font-weight: 700; }

  /* Matches */
  .match-list { display: flex; flex-direction: column; gap: 5px; }
  .day-hdr { font-size: 11px; font-weight: 700; color: var(--text-muted); padding: 12px 0 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .match-card { background: var(--card); border: 1px solid var(--border); border-radius: 7px; padding: 8px 12px; display: grid; grid-template-columns: 1fr 80px 1fr; align-items: center; gap: 8px; }
  .t-home { display: flex; align-items: center; justify-content: flex-end; gap: 6px; text-align: right; }
  .t-away { display: flex; align-items: center; gap: 6px; }
  .score-box { text-align: center; }
  .score-ft { font-size: 16px; font-weight: 700; color: var(--text); }
  .score-live { font-size: 16px; font-weight: 700; color: var(--hs-red); }
  .score-time { font-size: 10px; color: var(--text-muted); }
  .badge-live { display: inline-block; background: var(--hs-red); color: #fff; font-size: 8px; font-weight: 700; padding: 2px 5px; border-radius: 3px; }
  .badge-ht { background: #e67e22; }
  .grp-label { font-size: 9px; color: var(--text-faint); margin-top: 2px; }
  .fbar { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
  .fbar-btn { font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: var(--text-muted); cursor: pointer; font-family: Arial, sans-serif; }
  .fbar-btn.active { background: var(--hs-dark); color: var(--hs-mint); border-color: var(--hs-dark); }
  .legend { display: flex; gap: 14px; font-size: 10px; color: var(--text-muted); margin-top: 10px; padding: 8px 0; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 4px; vertical-align: middle; }
  .loading { padding: 40px; text-align: center; color: var(--text-muted); }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #ddd; border-top-color: var(--hs-red); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err-banner { background: #fdecea; border: 1px solid #f5c6cb; color: #c0392b; border-radius: 7px; padding: 12px 16px; font-size: 12px; }

  /* Pause indicator overlay */
  .pause-indicator {
    position: fixed; bottom: 16px; right: 16px; z-index: 200;
    background: rgba(1,43,58,0.85); color: var(--hs-mint);
    font-size: 10px; font-weight: 700; padding: 5px 10px;
    border-radius: 20px; letter-spacing: 0.05em;
    opacity: 0; transition: opacity 0.3s;
  }
  .pause-indicator.show { opacity: 1; }
</style>
</head>
<body>

<div class="tabs-bar">
  <button class="tab-btn active" id="tbtn-standings">Groups</button>
  <button class="tab-btn" id="tbtn-fixtures">Fixtures</button>
  <button class="tab-btn" id="tbtn-results">Results</button>
  <button class="tab-btn" id="tbtn-live">Live <span class="live-badge" id="live-badge"></span></button>
</div>

<div class="progress-bar"><div class="progress-fill" id="prog"></div></div>

<div class="viewport">
  <div class="scroller" id="scroller">
    <div class="tab-panel active" id="tab-standings"><div class="loading"><span class="spinner"></span>Loading...</div></div>
    <div class="tab-panel" id="tab-fixtures"><div class="loading"><span class="spinner"></span>Loading...</div></div>
    <div class="tab-panel" id="tab-results"><div class="loading"><span class="spinner"></span>Loading...</div></div>
    <div class="tab-panel" id="tab-live"><div class="loading"><span class="spinner"></span>Loading...</div></div>
  </div>
</div>

<div class="pause-indicator" id="pause-ind">NEXT TAB</div>

<script>
var TOKEN = 'f38ec67b90c74c69a74052fba3461e84';
var BASE = 'https://corsproxy.io/?https://api.football-data.org/v4';
var allMatches = [];
var standingsData = null;
var fixturesByDay = {};

var TABS = ['standings', 'fixtures', 'results', 'live'];
var currentTab = 0;
var autoTimer = null;
var dataReady = false;

/* ---- API ---- */
function api(path) {
  return fetch(BASE + path, { headers: { 'X-Auth-Token': TOKEN } })
    .then(function(r) {
      if (r.status === 403) throw new Error('Token rejected (403).');
      if (r.status === 429) throw new Error('Rate limit hit.');
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    });
}

function loadAll() {
  Promise.all([
    api('/competitions/WC/standings'),
    api('/competitions/WC/matches')
  ]).then(function(res) {
    standingsData = res[0];
    allMatches = res[1].matches || [];
    renderStandings();
    renderFixtures();
    renderResults();
    renderLive();
    dataReady = true;
    startAuto();
  }).catch(function(e) {
    document.getElementById('tab-standings').innerHTML = '<div class="err-banner">Could not load data: ' + e.message + '</div>';
  });
}

/* ---- Tab switching ---- */
function showTab(idx) {
  currentTab = idx;
  var id = TABS[idx];
  TABS.forEach(function(t) {
    document.getElementById('tab-' + t).classList.toggle('active', t === id);
    document.getElementById('tbtn-' + t).classList.toggle('active', t === id);
  });
  document.getElementById('scroller').scrollTop = 0;
}

/* ---- Auto scroll + cycle ---- */
var SCROLL_SPEED = 40;       // px per frame
var SCROLL_INTERVAL = 16;    // ms per frame (~60fps)
var PAUSE_AFTER_MS = 5000;   // wait at bottom before next tab
var PAUSE_BEFORE_MS = 1000;  // brief pause at top before scrolling

function startAuto() {
  if (autoTimer) clearTimeout(autoTimer);
  showTab(0);
  autoTimer = setTimeout(beginScrollCycle, 800);
}

function beginScrollCycle() {
  pauseAtTop(function() {
    scrollToBottom(function() {
      pauseAtBottom(function() {
        var next = (currentTab + 1) % TABS.length;
        showTab(next);
        beginScrollCycle();
      });
    });
  });
}

function pauseAtTop(cb) {
  setProgress(0, PAUSE_BEFORE_MS);
  autoTimer = setTimeout(cb, PAUSE_BEFORE_MS);
}

function scrollToBottom(cb) {
  var scroller = document.getElementById('scroller');
  var start = scroller.scrollTop;
  var end = scroller.scrollHeight - scroller.clientHeight;
  if (end <= 0) { cb(); return; }

  var duration = Math.max(3000, (end / SCROLL_SPEED) * SCROLL_INTERVAL);
  var startTime = null;

  function step(ts) {
    if (!startTime) startTime = ts;
    var elapsed = ts - startTime;
    var progress = Math.min(elapsed / duration, 1);
    var eased = progress; // linear scroll
    scroller.scrollTop = start + (end - start) * eased;
    setProgress(progress * 100, 0);
    if (progress < 1) {
      autoTimer = requestAnimationFrame(step);
    } else {
      cb();
    }
  }
  autoTimer = requestAnimationFrame(step);
}

function pauseAtBottom(cb) {
  var ind = document.getElementById('pause-ind');
  ind.classList.add('show');
  var start = Date.now();
  var dur = PAUSE_AFTER_MS;

  function tick() {
    var elapsed = Date.now() - start;
    var p = Math.min(elapsed / dur, 1);
    setProgress(100 - p * 100, 0);
    if (p < 1) {
      autoTimer = setTimeout(tick, 50);
    } else {
      ind.classList.remove('show');
      cb();
    }
  }
  tick();
}

function setProgress(pct, transMs) {
  var fill = document.getElementById('prog');
  fill.style.transition = transMs > 0 ? 'width ' + transMs + 'ms linear' : 'none';
  fill.style.width = pct + '%';
}

/* ---- Render standings ---- */
function renderStandings() {
  var groups = (standingsData && standingsData.standings || []).filter(function(s) { return s.type === 'TOTAL'; });
  if (!groups.length) { document.getElementById('tab-standings').innerHTML = '<div class="loading">No standings data yet.</div>'; return; }
  var h = '<div class="grp-grid">';
  groups.forEach(function(g) {
    var name = (g.group || 'Group').replace('GROUP_', 'Group ');
    h += '<div class="grp-card"><div class="grp-hdr">' + name + '</div>';
    h += '<table class="grp-table"><thead><tr><th colspan="2">Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr></thead><tbody>';
    (g.table || []).forEach(function(row, i) {
      var q = i < 2;
      var cr = row.team.crest ? '<img src="' + row.team.crest + '" class="crest" onerror="this.style.display=\'none\'">' : '';
      var nm = row.team.shortName || row.team.name;
      var gd = (row.goalDifference > 0 ? '+' : '') + row.goalDifference;
      h += '<tr' + (q ? ' class="qualify"' : '') + '>';
      h += '<td class="tn"><span class="pos-b ' + (q ? 'pos-q' : 'pos-n') + '">' + (i+1) + '</span>' + cr + nm + '</td>';
      h += '<td>' + row.playedGames + '</td><td>' + row.won + '</td><td>' + row.draw + '</td><td>' + row.lost + '</td>';
      h += '<td>' + gd + '</td><td class="pts-bold">' + row.points + '</td></tr>';
    });
    h += '</tbody></table></div>';
  });
  h += '</div><div class="legend"><span><span class="legend-dot" style="background:var(--hs-mint);border:1px solid #aee;"></span>Qualify to Round of 32</span></div>';
  document.getElementById('tab-standings').innerHTML = h;
}

/* ---- Render fixtures ---- */
function renderFixtures() {
  var upc = allMatches.filter(function(m) { return m.status === 'TIMED' || m.status === 'SCHEDULED'; });
  var byD = groupByDay(upc);
  var days = Object.keys(byD).sort();
  fixturesByDay = byD;
  if (!days.length) { document.getElementById('tab-fixtures').innerHTML = '<div class="loading">No upcoming fixtures.</div>'; return; }
  var fbar = '<div class="fbar"><button class="fbar-btn active" onclick="filterDay(\'all\', this)">All</button>';
  days.slice(0, 14).forEach(function(d) { fbar += '<button class="fbar-btn" onclick="filterDay(\'' + d + '\', this)">' + fmtShort(d) + '</button>'; });
  fbar += '</div>';
  document.getElementById('tab-fixtures').innerHTML = fbar + '<div id="flist">' + renderDays(byD, days) + '</div>';
}

function filterDay(d, el) {
  document.querySelectorAll('.fbar .fbar-btn').forEach(function(b) { b.classList.remove('active'); });
  el.classList.add('active');
  var days = d === 'all' ? Object.keys(fixturesByDay).sort() : [d];
  var sub = {};
  days.forEach(function(x) { sub[x] = fixturesByDay[x]; });
  document.getElementById('flist').innerHTML = renderDays(sub, days);
}

/* ---- Render results ---- */
function renderResults() {
  var fin = allMatches.filter(function(m) { return m.status === 'FINISHED'; }).reverse();
  if (!fin.length) { document.getElementById('tab-results').innerHTML = '<div class="loading">No results yet.</div>'; return; }
  var byD = groupByDay(fin);
  var days = Object.keys(byD).sort().reverse();
  document.getElementById('tab-results').innerHTML = renderDays(byD, days);
}

/* ---- Render live ---- */
function renderLive() {
  var live = allMatches.filter(function(m) { return m.status === 'IN_PLAY' || m.status === 'PAUSED' || m.status === 'HALFTIME'; });
  var badge = document.getElementById('live-badge');
  if (live.length) { badge.style.display = 'inline'; badge.textContent = live.length; } else { badge.style.display = 'none'; }
  if (!live.length) { document.getElementById('tab-live').innerHTML = '<div class="loading">No matches live right now.</div>'; return; }
  var byD = groupByDay(live);
  document.getElementById('tab-live').innerHTML = renderDays(byD, Object.keys(byD).sort());
}

/* ---- Helpers ---- */
function renderDays(byD, days) {
  if (!days.length) return '<div class="loading">Nothing to show.</div>';
  var h = '<div class="match-list">';
  days.forEach(function(d) {
    if (!byD[d] || !byD[d].length) return;
    h += '<div class="day-hdr">' + fmtLong(d) + '</div>';
    byD[d].forEach(function(m) { h += matchCard(m); });
  });
  return h + '</div>';
}

function matchCard(m) {
  var hn = m.homeTeam.shortName || m.homeTeam.name || 'TBD';
  var an = m.awayTeam.shortName || m.awayTeam.name || 'TBD';
  var hc = m.homeTeam.crest ? '<img src="' + m.homeTeam.crest + '" class="crest" onerror="this.style.display=\'none\'">' : '';
  var ac = m.awayTeam.crest ? '<img src="' + m.awayTeam.crest + '" class="crest" onerror="this.style.display=\'none\'">' : '';
  var isLive = m.status === 'IN_PLAY' || m.status === 'PAUSED' || m.status === 'HALFTIME';
  var isFin  = m.status === 'FINISHED';
  var sb = '';
  if (isFin && m.score && m.score.fullTime) {
    var h2 = m.score.fullTime.home, a2 = m.score.fullTime.away;
    sb = '<div class="score-ft">' + (h2 !== null ? h2 : '-') + ' &ndash; ' + (a2 !== null ? a2 : '-') + '</div><div class="score-time">FT</div>';
  } else if (isLive && m.score) {
    var sc = m.score.fullTime || {};
    var lbl = m.status === 'HALFTIME' ? 'HT' : 'LIVE';
    var bc = m.status === 'HALFTIME' ? 'badge-ht' : '';
    sb = '<div class="score-live">' + (sc.home !== null && sc.home !== undefined ? sc.home : 0) + ' &ndash; ' + (sc.away !== null && sc.away !== undefined ? sc.away : 0) + '</div><span class="badge-live ' + bc + '">' + lbl + '</span>';
  } else {
    var kt = m.utcDate ? new Date(m.utcDate).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', timeZone: 'Europe/Luxembourg'}) : '--:--';
    sb = '<div style="font-size:14px;font-weight:700;color:#1a1a1a;">' + kt + '</div><div class="score-time">CET</div>';
  }
  var grp = m.group ? '<div class="grp-label">' + m.group.replace('GROUP_', 'Group ') + '</div>' : '';
  return '<div class="match-card"><div class="t-home">' + hn + hc + '</div><div class="score-box">' + sb + grp + '</div><div class="t-away">' + ac + an + '</div></div>';
}

function groupByDay(arr) {
  var o = {};
  arr.forEach(function(m) { var d = (m.utcDate || '').slice(0,10); if (!o[d]) o[d] = []; o[d].push(m); });
  return o;
}

function fmtShort(d) { return new Date(d + 'T12:00:00Z').toLocaleDateString('en-GB', {day:'numeric', month:'short'}); }
function fmtLong(d) { return new Date(d + 'T12:00:00Z').toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'}); }

loadAll();
</script>
</body>
</html>
